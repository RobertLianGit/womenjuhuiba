  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>

  <script>
    $(function() {
      // === 工具函数 ===

      // 显示 Toast 通知
      function showToast(msg) {
        $('#toast-text').text(msg);
        $('#toast').css('opacity', '1');
        setTimeout(function() {
          $('#toast').css('opacity', '0');
        }, 2000);
      }

      // 显示确认弹窗
      function showConfirm(title, desc, onConfirm) {
        $('#confirm-modal-title').text(title);
        $('#confirm-modal-desc').text(desc);
        $('#confirm-modal').removeClass('hidden');
        // 解绑旧事件，绑定新确认回调
        $('#btn-confirm-ok').off('click').on('click', function() {
          $('#confirm-modal').addClass('hidden');
          if (onConfirm) onConfirm();
        });
      }

      // 关闭确认弹窗
      $('#btn-confirm-cancel').on('click', function() {
        $('#confirm-modal').addClass('hidden');
      });

      // 点击弹窗背景关闭
      $('#confirm-modal').on('click', function(e) {
        if ($(e.target).is('#confirm-modal')) {
          $('#confirm-modal').addClass('hidden');
        }
      });

      // === 复制链接 ===
      $('#btn-copy-link').on('click', function() {
        // 复制活动链接到剪贴板
        // 1. 获取链接文本
        // 2. 使用 navigator.clipboard.writeText 写入剪贴板
        // 3. 显示成功 Toast
        var linkText = 'https://party.app/activity?id=act_001';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(linkText).then(function() {
            showToast('链接已复制到剪贴板');
          });
        } else {
          // 降级方案：创建临时 input 复制
          var $temp = $('<input>').val(linkText).appendTo('body').select();
          document.execCommand('copy');
          $temp.remove();
          showToast('链接已复制到剪贴板');
        }
      });

      // === 状态流转按钮交互 ===

      // 开始收集意愿 - 点击后：
      // 1. 弹出确认弹窗"确定开始收集意愿？"
      // 2. 确认后更新状态徽章为"意愿收集中"（粉色背景）
      // 3. 显示"意愿收集"和"投票"入口卡片为可点击状态
      // 4. 隐藏此按钮，显示"开始投票"按钮
      $('#btn-start-intention').on('click', function() {
        showConfirm('开始收集意愿', '确定要开始收集大家的意愿吗？', function() {
          showToast('已开始收集意愿');
        });
      });

      // 开始投票 - 点击后：
      // 1. 弹出确认弹窗"确定开始投票？意愿收集将关闭"
      // 2. 确认后更新状态徽章为"投票中"（蓝色背景）
      // 3. 高亮"投票"卡片为可点击
      // 4. 隐藏此按钮，显示"确认方案"按钮
      $('#btn-start-vote').on('click', function() {
        showConfirm('开始投票', '确定开始投票？意愿收集将关闭，无法再提交意愿。', function() {
          showToast('已开始投票');
        });
      });

      // 确认方案 - 点击后：
      // 1. 弹出确认弹窗"确定确认方案？"
      // 2. 确认后更新状态徽章为"方案确认"（黄色背景）
      // 3. 高亮"方案确认"卡片为可点击
      // 4. 隐藏此按钮，显示"开启报名"按钮
      $('#btn-confirm-plan').on('click', function() {
        showConfirm('确认方案', '确定确认方案？投票将关闭。', function() {
          showToast('方案已确认');
        });
      });

      // 开启报名 - 点击后：
      // 1. 弹出确认弹窗"确定开启报名？"
      // 2. 确认后更新状态徽章为"报名中"（绿色背景）
      // 3. 高亮"报名"和"看板"卡片为可点击
      // 4. 隐藏此按钮，显示"活动开始"按钮
      $('#btn-start-register').on('click', function() {
        showConfirm('开启报名', '确定开启报名？', function() {
          showToast('报名已开启');
        });
      });

      // 活动开始 - 点击后：
      // 1. 弹出确认弹窗"确定标记活动开始？"
      // 2. 确认后更新状态徽章为"进行中"（蓝色背景）
      // 3. 高亮"结算"卡片为可点击
      // 4. 隐藏此按钮，显示"结算"按钮
      $('#btn-start-activity').on('click', function() {
        showConfirm('活动开始', '确定标记活动开始？', function() {
          showToast('活动已开始');
        });
      });

      // 结算 - 点击后：
      // 1. 弹出确认弹窗"确定进入结算？"
      // 2. 确认后更新状态徽章为"已结算"（灰色背景）
      // 3. 隐藏此按钮，操作区清空
      $('#btn-settle').on('click', function() {
        showConfirm('结算', '确定进入结算？活动将标记为已结算。', function() {
          showToast('已进入结算');
        });
      });
    });
  </script>
</body>

</html>
